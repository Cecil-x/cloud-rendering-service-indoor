<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Three.js TURN 云流化点云</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Remote Three.js Rendering - TURN</p>
        <h1>三维点云云渲染 / TURN 中继模式</h1>
        <p class="intro">本页面强制使用 TURN 中继，适合跨网段访问测试。</p>
        <label class="server-field">
          <span>云渲染服务地址</span>
          <input id="serverUrl" type="url" placeholder="http://172.20.13.53:3000" autocomplete="url" />
        </label>
        <label class="server-field compact">
          <span>点云文件</span>
          <input id="pointCloudFile" list="pointCloudFiles" placeholder="GlobalMap.pcd" autocomplete="off" />
          <datalist id="pointCloudFiles"></datalist>
        </label>
        <div class="actions">
          <button id="start">启动云渲染会话</button>
          <span id="status">等待启动</span>
        </div>
        <label class="server-field compact">
          <span>点云显示比例：<strong id="pointDensityValue">20%</strong></span>
          <input id="pointDensity" type="range" min="5" max="100" step="5" value="20" />
        </label>
      </section>

      <section class="viewer-card">
        <video id="stream" autoplay playsinline muted></video>
        <div class="hint">TURN 中继模式：左键拖拽旋转，滚轮缩放。</div>
      </section>

      <section class="drone-panel">
        <div>
          <p class="eyebrow">Drone Prototype</p>
          <h2>无人机控制盘</h2>
          <p class="intro">荧光箭头代表无人机；右上角小窗为无人机第一视角。</p>
        </div>

        <div class="drone-layout">
          <div class="control-pad" aria-label="无人机控制盘">
            <button data-drone-action="forward">上</button>
            <button data-drone-action="left">左</button>
            <button data-drone-action="back">下</button>
            <button data-drone-action="right">右</button>
            <button data-drone-action="yaw-left">左转</button>
            <button data-drone-action="yaw-right">右转</button>
            <button data-drone-action="up">升高</button>
            <button data-drone-action="down">降低</button>
          </div>

          <form id="droneForm" class="drone-form">
            <label>X <input id="droneX" type="number" step="0.1" value="0" /></label>
            <label>Y <input id="droneY" type="number" step="0.1" value="0.8" /></label>
            <label>Z <input id="droneZ" type="number" step="0.1" value="0" /></label>
            <label>偏航 <input id="droneYaw" type="number" step="1" value="0" /></label>
            <label>云台偏航 <input id="gimbalYaw" type="number" step="1" value="0" /></label>
            <label>云台俯仰 <input id="gimbalPitch" type="number" step="1" value="0" /></label>
            <button type="submit">应用坐标/朝向</button>
          </form>

          <pre id="telemetry" class="telemetry">等待无人机遥测...</pre>
        </div>

        <div class="calibration-layout">
          <div class="calibration-card">
            <h3>点云标定</h3>
            <p>先点“标定原点”，在视频主画面中点击无人机起飞点；然后用控制盘把无人机机头/摄像头转到实际 X 正方向，再点击“以当前机头为 X 正方向”。</p>
            <div class="calibration-actions">
              <button id="pickOrigin" type="button">标定原点</button>
              <button id="pickXAxis" type="button">以当前机头为 X 正方向</button>
            </div>
            <pre id="calibrationStatus" class="telemetry compact">未标定</pre>
          </div>

          <div class="calibration-card">
            <h3>实时无人机数据</h3>
            <label class="server-field realtime-field">
              <span>状态 WebSocket</span>
              <input id="backendWsUrl" type="url" value="ws://114.116.235.66/indoorUavFlightControlBackend/siteWebSocketServer/4a77dec9" />
            </label>
            <div class="calibration-actions">
              <button id="connectBackendWs" type="button">连接实时数据</button>
              <button id="disconnectBackendWs" type="button">断开</button>
            </div>
            <pre id="backendStatus" class="telemetry compact">未连接</pre>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/client-turn.js?v=turn-only-1"></script>
  </body>
</html>
